<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Top 10 SS DRS Seasons</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 1280px;
  height: 720px;
  overflow: hidden;
  background: #070906;
  font-family: 'DM Mono', monospace;
}

.frame {
  width: 1280px;
  height: 720px;
  display: flex;
  flex-direction: column;
  padding: 28px 44px 20px;
}

/* ── Header ── */
.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 18px;
  flex-shrink: 0;
  opacity: 0;
  animation: fadeDown 0.6s ease forwards 0.1s;
}

.header-left {}
.eyebrow {
  font-size: 10px;
  letter-spacing: 0.22em;
  color: #2e4a18;
  margin-bottom: 5px;
}
.title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 46px;
  letter-spacing: 0.04em;
  line-height: 1;
  color: #C8F135;
}
.subtitle {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 0.1em;
  color: #3a5a1a;
  margin-top: 2px;
}

.header-right {
  text-align: right;
}
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 0.12em;
  color: #1e2a10;
}
.logo span { color: #2e4a18; }

/* ── Col headers ── */
.col-heads {
  display: grid;
  grid-template-columns: 52px 60px 280px 56px 1fr 200px;
  gap: 0 16px;
  align-items: center;
  padding: 0 8px 8px;
  border-bottom: 1px solid #161a0e;
  margin-bottom: 6px;
  flex-shrink: 0;
  opacity: 0;
  animation: fadeUp 0.5s ease forwards 0.5s;
}
.col-head {
  font-size: 8px;
  letter-spacing: 0.2em;
  color: #253818;
}

/* ── Rows ── */
.rows { flex: 1; display: flex; flex-direction: column; gap: 4px; }

.row {
  display: grid;
  grid-template-columns: 52px 60px 280px 56px 1fr 200px;
  gap: 0 16px;
  align-items: center;
  padding: 8px 8px;
  border-radius: 3px;
  background: #0c0f09;
  border-left: 3px solid transparent;
  border-top: 1px solid #111508;
  border-right: 1px solid #111508;
  border-bottom: 1px solid #111508;
  opacity: 0;
  transform: translateX(-24px);
  flex: 1;
}

/* rank accent colors */
.row.r1 { border-left-color: #C8F135; background: #0e120a; }
.row.r2 { border-left-color: #9ed444; }
.row.r3 { border-left-color: #6aaa22; }
.row.r4, .row.r5 { border-left-color: #3a6a18; }

/* ── Rank num ── */
.rank-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px;
  letter-spacing: 0.02em;
  text-align: center;
  line-height: 1;
  color: #1e3010;
}
.r1 .rank-num { color: #C8F135; }
.r2 .rank-num { color: #9ed444; }
.r3 .rank-num { color: #6aaa22; }

/* ── Headshot ── */
.hs-wrap {
  width: 48px; height: 48px;
  border-radius: 50%;
  overflow: hidden;
  border: 2px solid #1a2410;
  background: #111408;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px; color: #2a4020;
  flex-shrink: 0;
}
.r1 .hs-wrap { border-color: #C8F13550; }
.r2 .hs-wrap { border-color: #9ed44440; }
.r3 .hs-wrap { border-color: #6aaa2230; }
.hs-wrap img { width:100%; height:100%; object-fit:cover; object-position: center top; }

/* ── Player info ── */
.player-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 0.04em;
  line-height: 1;
  color: #c0d880;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.r1 .player-name { color: #C8F135; }
.player-season {
  font-size: 9px;
  color: #2e4a18;
  letter-spacing: 0.14em;
  margin-top: 3px;
}

/* ── DRS number ── */
.drs-val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px;
  letter-spacing: 0.02em;
  line-height: 1;
  text-align: right;
  color: #3a6028;
}
.r1 .drs-val { color: #C8F135; }
.r2 .drs-val { color: #9ed444; }
.r3 .drs-val { color: #7dba2a; }
.r4 .drs-val, .r5 .drs-val { color: #5a8a22; }

/* ── Bar ── */
.bar-track {
  width: 100%;
  height: 8px;
  background: #111508;
  border-radius: 4px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  border-radius: 4px;
  width: 0%;
  transition: width 0.9s cubic-bezier(0.16, 1, 0.3, 1);
}
.r1 .bar-fill { background: #C8F135; }
.r2 .bar-fill { background: #9ed444; }
.r3 .bar-fill { background: #7dba2a; box-shadow: none; }
.r4 .bar-fill, .r5 .bar-fill { background: #4a7a1e; }
.bar-fill { background: #2e5010; }

/* ── Age badge ── */
.age-badge {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 10px;
}
.age-pill {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 64px;
  height: 44px;
  border-radius: 4px;
  background: #111508;
  border: 1px solid #1e2e10;
  flex-shrink: 0;
}
.age-label {
  font-size: 7px;
  letter-spacing: 0.18em;
  color: #2a4018;
  line-height: 1;
  margin-bottom: 3px;
}
.age-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  letter-spacing: 0.04em;
  line-height: 1;
}

/* Age color by range */
.age-young .age-num   { color: #C8F135; }  /* ≤23 */
.age-prime .age-num   { color: #8cc830; }  /* 24–27 */
.age-late .age-num    { color: #5a9022; }  /* 28–30 */
.age-veteran .age-num { color: #3a6018; }  /* 31+ */

.age-young .age-pill  { border-color: #C8F13540; background: #121a08; }
.age-prime .age-pill  { border-color: #8cc83030; background: #111508; }

.age-context {
  font-size: 8px;
  letter-spacing: 0.1em;
  line-height: 1.4;
  text-align: right;
  min-width: 120px;
}

/* ── Footer ── */
.footer {
  flex-shrink: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid #111508;
  opacity: 0;
  animation: fadeUp 0.4s ease forwards 1.8s;
}
.footer-note { font-size: 8px; color: #1a2610; letter-spacing: 0.12em; }

@keyframes fadeDown {
  from { opacity:0; transform:translateY(-10px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(6px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes slideIn {
  from { opacity:0; transform:translateX(-24px); }
  to   { opacity:1; transform:translateX(0); }
}
</style>
</head>
<body>
<div class="frame">

  <div class="header">
    <div class="header-left">
      <div class="eyebrow">SPORTS INFO SOLUTIONS · DEFENSIVE RUNS SAVED · 2003–2025 · MIN 500 INN</div>
      <div class="title">Top 10 Single-Season DRS</div>
      <div class="subtitle">Shortstop</div>
    </div>
    <div class="header-right">
      <div class="logo">DIAMOND<span>MINE</span></div>
    </div>
  </div>

  <div class="col-heads">
    <div class="col-head" style="text-align:center">#</div>
    <div class="col-head"></div>
    <div class="col-head">PLAYER · SEASON</div>
    <div class="col-head" style="text-align:right">DRS</div>
    <div class="col-head" style="padding-left:4px">RELATIVE TO LEADER (+42)</div>
    <div class="col-head" style="text-align:right">SEASON AGE</div>
  </div>

  <div class="rows" id="rows"></div>

  <div class="footer">
    <div class="footer-note">DATA: SPORTS INFO SOLUTIONS VIA FIELDINGBIBLE.COM · VISUALIZATION: DIAMONDMINE</div>
    <div class="logo" style="font-size:13px;">DIAMOND<span>MINE</span></div>
  </div>

</div>

<script>
const BASE = 'http://localhost:5000';
const MAX_DRS = 42;
const HS_BASE = '/Users/euno/Desktop/DiamondMine/data/baseball_output_2015_present/headshots/';

const DATA = [
  { rank:1,  rc:'r1', player:'Andrelton Simmons', season:2017, drs:42, age:27, initials:'AS', hs:'Andrelton_Simmons_CHN_2022.jpg' },
  { rank:2,  rc:'r2', player:'Adam Everett',      season:2006, drs:34, age:29, initials:'AE', hs:'Adam_Everett_CLE_2011.jpg' },
  { rank:3,  rc:'r3', player:'Javier Báez',       season:2019, drs:33, age:26, initials:'JB', hs:'Javier_Baez_DET_2025.jpg' },
  { rank:4,  rc:'r4', player:'Andrelton Simmons', season:2013, drs:33, age:23, initials:'AS', hs:'Andrelton_Simmons_CHN_2022.jpg' },
  { rank:5,  rc:'r5', player:'Jack Wilson',       season:2005, drs:32, age:27, initials:'JW', hs:'Jack_Wilson_ATL_2012.jpg' },
  { rank:6,  rc:'',   player:'Troy Tulowitzki',   season:2007, drs:31, age:22, initials:'TT', hs:'Troy_Tulowitzki_NYA_2019.jpg' },
  { rank:7,  rc:'',   player:'Andrelton Simmons', season:2015, drs:28, age:25, initials:'AS', hs:'Andrelton_Simmons_CHN_2022.jpg' },
  { rank:8,  rc:'',   player:'Jack Wilson',       season:2009, drs:28, age:31, initials:'JW', hs:'Jack_Wilson_ATL_2012.jpg' },
  { rank:9,  rc:'',   player:'Brendan Ryan',      season:2012, drs:27, age:30, initials:'BR', hs:'Brendan_Ryan_LAA_2016.jpg' },
  { rank:10, rc:'',   player:'Alex Gonzalez',     season:2010, drs:26, age:33, initials:'AG', hs:'Alex_Gonzalez_DET_2014.jpg' },
];

function ageClass(age) {
  if (age <= 23) return 'age-young';
  if (age <= 27) return 'age-prime';
  if (age <= 30) return 'age-late';
  return 'age-veteran';
}

function ageContext(age) {
  if (age <= 22) return '<span style="color:#C8F135">YOUNGEST</span><br>ON LIST';
  if (age === 23) return '<span style="color:#C8F135">JUST 23</span><br>YEARS OLD';
  if (age <= 25) return '<span style="color:#8cc830">EARLY</span><br>PRIME';
  if (age <= 27) return '<span style="color:#7dba2a">PEAK</span><br>PRIME';
  if (age <= 29) return '<span style="color:#5a8a22">LATE</span><br>PRIME';
  if (age <= 31) return '<span style="color:#3a6a18">VETERAN</span>';
  return '<span style="color:#2a5010">DEEP</span><br>VETERAN';
}

function buildRow(d) {
  const pct = Math.round((d.drs / MAX_DRS) * 100);
  const ac = ageClass(d.age);
  const el = document.createElement('div');
  el.className = `row ${d.rc}`;
  el.id = `row-${d.rank}`;
  el.innerHTML = `
    <div class="rank-num">${d.rank}</div>
    <div class="hs-wrap" id="hs-${d.rank}">${d.initials}</div>
    <div>
      <div class="player-name">${d.player}</div>
      <div class="player-season">${d.season} SEASON</div>
    </div>
    <div class="drs-val">+${d.drs}</div>
    <div>
      <div class="bar-track">
        <div class="bar-fill" id="bar-${d.rank}" data-pct="${pct}"></div>
      </div>
    </div>
    <div class="age-badge ${ac}">
      <div class="age-context" style="color:#2a4018">${ageContext(d.age)}</div>
      <div class="age-pill">
        <div class="age-label">AGE</div>
        <div class="age-num">${d.age}</div>
      </div>
    </div>
  `;
  return el;
}

async function loadHS(d) {
  try {
    const url = `${BASE}/headshot?path=${encodeURIComponent(HS_BASE + d.hs)}`;
    const r = await fetch(url);
    if (!r.ok) return;
    const blob = await r.blob();
    const el = document.getElementById(`hs-${d.rank}`);
    if (el) el.innerHTML = `<img src="${URL.createObjectURL(blob)}" alt="${d.player}"/>`;
  } catch(e) {}
}

const container = document.getElementById('rows');
DATA.forEach(d => container.appendChild(buildRow(d)));

// Stagger rows
DATA.forEach((d, i) => {
  const row = document.getElementById(`row-${d.rank}`);
  setTimeout(() => {
    row.style.animation = `slideIn 0.45s cubic-bezier(0.16,1,0.3,1) forwards`;
    setTimeout(() => {
      const bar = document.getElementById(`bar-${d.rank}`);
      if (bar) bar.style.width = bar.dataset.pct + '%';
    }, 280);
  }, 620 + i * 110);
});

DATA.forEach(d => loadHS(d));
</script>
</body>
</html>
