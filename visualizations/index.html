<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DiamondMine Visualizations</title>
  <style>
    body { background: #07060f; color: #f5f0ff; font-family: 'DM Mono', monospace; padding: 40px; }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: #c084fc; letter-spacing: 0.1em; margin-bottom: 8px; }
    .subtitle { color: #6b5fa0; font-size: 12px; letter-spacing: 0.1em; margin-bottom: 40px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .card { background: #0d0b1a; border: 1px solid #2e2860; border-radius: 6px; padding: 20px; text-decoration: none; color: inherit; transition: border-color 0.2s; display: block; }
    .card:hover { border-color: #c084fc; }
    .card-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: #c084fc; letter-spacing: 0.08em; margin-bottom: 6px; }
    .card-desc { font-size: 11px; color: #c4b5e8; line-height: 1.6; }
    .empty { color: #3d3460; font-size: 12px; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <h1>DIAMONDMINE</h1>
  <div class="subtitle">DATA VISUALIZATIONS</div>
  <div class="grid" id="viz-grid">
    <p class="empty">No visualizations yet — add HTML files to this folder.</p>
  </div>
</body>
</html>
