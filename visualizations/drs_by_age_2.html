<title>Average DRS by Age — Top 30 Shortstops</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0c08;
    color: #c8dfa0;
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 32px;
  }

  .outer {
    width: 100%;
    max-width: 960px;
  }

  .header {
    margin-bottom: 32px;
    opacity: 0;
    transform: translateY(-16px);
    animation: fadeDown 0.7s ease forwards 0.2s;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.22em;
    color: #4a6a2a;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(32px, 5vw, 58px);
    letter-spacing: 0.04em;
    line-height: 1;
    color: #C8F135;
    text-shadow: 0 0 40px rgba(200,241,53,0.15);
  }

  .subtitle {
    margin-top: 10px;
    font-size: 12px;
    color: #4a6a2a;
    letter-spacing: 0.12em;
  }

  .stats-row {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.6s;
  }

  .stat-card {
    flex: 1;
    min-width: 110px;
    background: #111408;
    border: 1px solid #1e2410;
    border-radius: 3px;
    padding: 14px 16px;
  }

  .stat-label {
    font-size: 9px;
    letter-spacing: 0.18em;
    color: #4a6a2a;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 0.04em;
    color: #C8F135;
  }

  .chart-wrap {
    background: #0d0f0a;
    border: 1px solid #1e2410;
    border-radius: 3px;
    padding: 32px 28px 24px;
    position: relative;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards 0.9s;
  }

  .chart-inner {
    position: relative;
    width: 100%;
    height: 420px;
  }

  .zero-line-label {
    position: absolute;
    right: 0;
    font-size: 9px;
    color: #2a3a18;
    letter-spacing: 0.1em;
    pointer-events: none;
  }

  .footer {
    margin-top: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards 1.2s;
  }

  .footer-note {
    font-size: 10px;
    color: #2a3a18;
    letter-spacing: 0.1em;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 0.1em;
    color: #2a3a18;
  }

  .logo span { color: #4a6a2a; }

  @keyframes fadeDown {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>

mookieImg.onload = () => chart.update('none');
mookieImg.onerror = () => console.warn('Headshot failed to load — showing fallback');

const peakIdx = values.indexOf(Math.max(...values));

const datalabelPlugin = {
  id: 'datalabels',
  afterDatasetsDraw(chart) {
    const { ctx } = chart;
    const ds  = chart.getDatasetMeta(0);
    const ds1 = chart.getDatasetMeta(1);
    ctx.save();

    // ── Average line labels ───────────────────────────────────────────────────
    ds.data.forEach((pt, i) => {
      if (pt.skip) return;
      const val = values[i];
      const isPeak = i === peakIdx;
      const isNeg  = val < 0;
      const label  = (val > 0 ? '+' : '') + val.toFixed(1);

      ctx.textAlign = 'center';
      const yOffset = val >= 0 ? -16 : 16;
      ctx.textBaseline = val >= 0 ? 'bottom' : 'top';

      if (isPeak) {
        ctx.font = "bold 13px 'DM Mono', monospace";
        const bw = ctx.measureText(label).width + 16;
        const bh = 22;
        const bx = pt.x - bw / 2;
        const by = pt.y - bh - 10;
        ctx.fillStyle = 'rgba(200,241,53,0.12)';
        ctx.strokeStyle = '#C8F135';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(bx, by, bw, bh, 3);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#C8F135';
        ctx.textBaseline = 'middle';
        ctx.fillText(label, pt.x, by + bh / 2);
      } else {
        ctx.font = "11px 'DM Mono', monospace";
        ctx.fillStyle = isNeg ? '#e74c3c' : '#8a9a6a';
        ctx.fillText(label, pt.x, pt.y + yOffset);
      }
    });

    // ── Mookie headshot + callout ─────────────────────────────────────────────
    if (ds1.data[mookieIdx] && !ds1.data[mookieIdx].skip) {
      const mpt = ds1.data[mookieIdx];
      const mx = mpt.x, my = mpt.y;
      const R = 26; // circle radius

      // Dashed connector to avg line
      const avgPt = ds.data[mookieIdx];
      if (avgPt && !avgPt.skip) {
        ctx.beginPath();
        ctx.setLineDash([4, 4]);
        ctx.strokeStyle = 'rgba(126,200,227,0.3)';
        ctx.lineWidth = 1.5;
        ctx.moveTo(mx, my + R);
        ctx.lineTo(avgPt.x, avgPt.y);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // Glowing ring behind circle
      ctx.beginPath();
      ctx.arc(mx, my, R + 5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(126,200,227,0.12)';
      ctx.fill();

      // Clip to circle and draw headshot
      ctx.save();
      ctx.beginPath();
      ctx.arc(mx, my, R, 0, Math.PI * 2);
      ctx.clip();
      if (mookieImg.complete && mookieImg.naturalWidth > 0) {
        const s = R * 2;
        // Crop to centered square from source to avoid stretching
        const iw = mookieImg.naturalWidth;
        const ih = mookieImg.naturalHeight;
        const sq = Math.min(iw, ih);
        const sx = (iw - sq) / 2;
        const sy = (ih - sq) / 2;
        ctx.drawImage(mookieImg, sx, sy, sq, sq, mx - R, my - R, s, s);
      } else {
        // Fallback if image not loaded
        ctx.fillStyle = '#1a2a3a';
        ctx.fill();
        ctx.font = "bold 14px 'DM Mono', monospace";
        ctx.fillStyle = MOOKIE_COLOR;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('MB', mx, my);
      }
      ctx.restore();

      // Circle border
      ctx.beginPath();
      ctx.arc(mx, my, R, 0, Math.PI * 2);
      ctx.strokeStyle = MOOKIE_COLOR;
      ctx.lineWidth = 2.5;
      ctx.stroke();

      // Callout box to the left
      ctx.font = "bold 13px 'DM Mono', monospace";
      const nameLabel = 'MOOKIE BETTS';
      const statLabel = '+17 DRS · 2025 · AGE 32';
      ctx.font = "bold 13px 'DM Mono', monospace";
      const nw1 = ctx.measureText(nameLabel).width;
      ctx.font = "10px 'DM Mono', monospace";
      const nw2 = ctx.measureText(statLabel).width;
      const boxW = Math.max(nw1, nw2) + 24;
      const boxH = 48;
      const boxX = mx - R - boxW - 12;
      const boxY = my - boxH / 2;

      ctx.fillStyle = 'rgba(8,12,6,0.94)';
      ctx.strokeStyle = MOOKIE_COLOR;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.roundRect(boxX, boxY, boxW, boxH, 4);
      ctx.fill();
      ctx.stroke();

      // Connector line
      ctx.beginPath();
      ctx.strokeStyle = MOOKIE_COLOR;
      ctx.lineWidth = 1.5;
      ctx.moveTo(boxX + boxW, my);
      ctx.lineTo(mx - R - 2, my);
      ctx.stroke();

      ctx.font = "bold 13px 'DM Mono', monospace";
      ctx.fillStyle = MOOKIE_COLOR;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(nameLabel, boxX + 12, boxY + 8);

      ctx.font = "10px 'DM Mono', monospace";
      ctx.fillStyle = 'rgba(126,200,227,0.65)';
      ctx.fillText(statLabel, boxX + 12, boxY + 28);
    }

    ctx.restore();
  }
};

Chart.register(datalabelPlugin);

// Animated draw — reveal points one by one
let revealCount = 0;
const totalPts  = DATA.length;
const revealPlugin = {
  id: 'reveal',
  beforeDraw(chart) {
    const meta = chart.getDatasetMeta(0);
    meta.data.forEach((pt, i) => { pt.skip = i > revealCount; });
    // Hide Mookie until triggered
    const mookieMeta = chart.getDatasetMeta(1);
    mookieMeta.data.forEach(pt => {
      if (revealCount < totalPts - 1) pt.skip = true;
    });
  }
};

const chart = new Chart(document.getElementById('chart'), {
  type: 'line',
  plugins: [revealPlugin],
  data: {
    labels,
    datasets: [
      {
        label: 'Top 30 avg',
        data: values,
        borderColor: '#2a5a18',
        borderWidth: 2.5,
        pointBackgroundColor: ptColors,
        pointBorderColor: ptColors,
        pointBorderWidth: 2,
        pointRadius: sizes,
        pointHoverRadius: sizes.map(s => s + 3),
        tension: 0.38,
        fill: {
          target: { value: 0 },
          above: 'rgba(200,241,53,0.07)',
          below: 'rgba(231,76,60,0.08)',
        },
      },
      {
        label: 'Mookie Betts',
        data: labels.map((age) => age === MOOKIE.age ? MOOKIE.drs : null),
        borderColor: 'transparent',
        pointBackgroundColor: 'transparent',
        pointBorderColor: 'transparent',
        pointBorderWidth: 0,
        pointRadius: 28,
        pointHoverRadius: 30,
        showLine: false,
        spanGaps: false,
      }
    ]
  },
  options: {
    animation: { duration: 0 },
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#111408',
        titleColor: '#C8F135',
        bodyColor: '#8a9a6a',
        borderColor: '#1e2410',
        borderWidth: 1,
        titleFont: { family: "'Bebas Neue', sans-serif", size: 16 },
        bodyFont:  { family: "'DM Mono', monospace", size: 11 },
        padding: 12,
        callbacks: {
          title: items => `Age ${items[0].label}`,
          label: item => {
            if (item.datasetIndex === 1) return ['Mookie Betts · 2025', 'DRS: +17'];
            const d = DATA[item.dataIndex];
            const sign = d.avg > 0 ? '+' : '';
            return [`Avg DRS: ${sign}${d.avg.toFixed(2)}`, `Sample: ${d.n} players`];
          }
        }
      }
    },
    scales: {
      x: {
        grid: { color: 'rgba(255,255,255,0.04)', drawBorder: false },
        border: { color: '#1e2410' },
        ticks: {
          font: { family: "'DM Mono', monospace", size: 11 },
          color: '#4a6a2a',
          callback: v => DATA[v]?.age
        },
        title: {
          display: true,
          text: 'AGE',
          font: { family: "'Bebas Neue', sans-serif", size: 14 },
          color: '#2a3a18',
          padding: { top: 10 }
        }
      },
      y: {
        grid: {
          color: ctx => ctx.tick.value === 0 ? 'rgba(200,241,53,0.15)' : 'rgba(255,255,255,0.04)',
          lineWidth: ctx => ctx.tick.value === 0 ? 1.5 : 1,
          drawBorder: false
        },
        border: { color: '#1e2410' },
        min: -8,
        max: 22,
        ticks: {
          font: { family: "'DM Mono', monospace", size: 11 },
          color: '#4a6a2a',
          callback: v => (v > 0 ? '+' : '') + v
        },
        title: {
          display: true,
          text: 'AVG DRS (TOP 30)',
          font: { family: "'Bebas Neue', sans-serif", size: 14 },
          color: '#2a3a18',
          padding: { bottom: 10 }
        }
      }
    }
  }
});

// Legend
const legendEl = document.createElement('div');
legendEl.style.cssText = 'display:flex;gap:20px;margin-top:14px;justify-content:flex-end;';
legendEl.innerHTML = `
  <span style="display:flex;align-items:center;gap:6px;font-size:10px;color:#4a6a2a;letter-spacing:0.1em;">
    <span style="width:24px;height:2px;background:#2a5a18;display:inline-block;border-radius:1px;"></span>
    TOP 30 AVG
  </span>
  <span style="display:flex;align-items:center;gap:6px;font-size:10px;color:#7ec8e3;letter-spacing:0.1em;">
    <span style="width:10px;height:10px;background:#7ec8e3;display:inline-block;border-radius:50%;border:2px solid #fff;"></span>
    MOOKIE BETTS · 2025
  </span>
`;
document.querySelector('.chart-wrap').appendChild(legendEl);

// Animate points appearing one by one, then reveal Mookie last
const revealDelay = 80;
let mookieRevealed = false;
function revealNext() {
  if (revealCount < totalPts - 1) {
    revealCount++;
    chart.update('none');
    setTimeout(revealNext, revealDelay);
  } else {
    chart.update('none');
    // Reveal Mookie's point after a dramatic pause
    setTimeout(() => {
      const mookieMeta = chart.getDatasetMeta(1);
      mookieMeta.data.forEach(pt => { pt.skip = false; });
      chart.update('none');
    }, 600);
  }
}

setTimeout(() => {
  chart.update('none');
  setTimeout(revealNext, 400);
}, 1200);
</script>
</body>
</html>
