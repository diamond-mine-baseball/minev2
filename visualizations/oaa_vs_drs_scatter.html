const POSITIONS = ['SS','3B','2B','CF','RF','LF','1B'];
let activePos = new Set(POSITIONS);

function buildDatasets() {
  return POSITIONS.map(pos => ({
    label: pos,
    data: raw.filter(d => d.pos === pos && activePos.has(pos)).map(d => ({x: d.oaa, y: d.drs, raw: d})),
    backgroundColor: POS_COLORS[pos] + 'bb',
    borderColor: POS_COLORS[pos],
    borderWidth: 1,
    pointRadius: 5,
    pointHoverRadius: 8,
  }));
}

const ctx = document.getElementById('chart').getContext('2d');

const diagonalPlugin = {
  id: 'diagonal',
  afterDraw(chart) {
    const xScale = chart.scales.x;
    const yScale = chart.scales.y;
    const ctx2 = chart.ctx;
    const minVal = Math.max(xScale.min, yScale.min);
    const maxVal = Math.min(xScale.max, yScale.max);
    ctx2.save();
    ctx2.beginPath();
    ctx2.setLineDash([4, 6]);
    ctx2.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx2.lineWidth = 1;
    ctx2.moveTo(xScale.getPixelForValue(minVal), yScale.getPixelForValue(minVal));
    ctx2.lineTo(xScale.getPixelForValue(maxVal), yScale.getPixelForValue(maxVal));
    ctx2.stroke();
    ctx2.setLineDash([]);
    ctx2.font = "500 10px 'IBM Plex Mono'";
    ctx2.fillStyle = 'rgba(255,255,255,0.15)';
    ctx2.textAlign = 'left';
    ctx2.fillText('OAA = DRS', xScale.getPixelForValue(maxVal - 8), yScale.getPixelForValue(maxVal) - 6);
    ctx2.restore();
  }
};

Chart.register(diagonalPlugin);

const chart = new Chart(ctx, {
  type: 'scatter',
  data: { datasets: buildDatasets() },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 400 },
    plugins: {
      legend: { display: false },
      tooltip: { enabled: false },
    },
    scales: {
      x: {
        min: -30, max: 45,
        grid: { color: 'rgba(255,255,255,0.04)' },
        border: { color: '#2a2a30' },
        title: {
          display: true,
          text: 'OAA (Outs Above Average)',
          color: '#4a4a50',
          font: { family: "'IBM Plex Mono'", size: 11 },
          padding: { top: 8 },
        },
        ticks: { color: '#4a4a50', font: { family: "'IBM Plex Mono'", size: 11 } }
      },
      y: {
        min: -30, max: 45,
        grid: { color: 'rgba(255,255,255,0.04)' },
        border: { color: '#2a2a30', dash: [4,4] },
        title: {
          display: true,
          text: 'DRS (Defensive Runs Saved)',
          color: '#4a4a50',
          font: { family: "'IBM Plex Mono'", size: 11 },
          padding: { bottom: 8 },
        },
        ticks: { color: '#4a4a50', font: { family: "'IBM Plex Mono'", size: 11 } }
      }
    },
    onHover: (e, elements) => {
      const tooltip = document.getElementById('tooltip');
      if (!elements.length) { tooltip.style.opacity = 0; return; }
      const el  = elements[0];
      const d   = chart.data.datasets[el.datasetIndex].data[el.index].raw;
      document.getElementById('tt-name').textContent = d.n;
      document.getElementById('tt-meta').textContent = d.y + ' · ' + d.pos;
      document.getElementById('tt-oaa').innerHTML  = `${d.oaa}<span>OAA</span>`;
      document.getElementById('tt-drs').innerHTML  = `${d.drs}<span>DRS</span>`;
      document.getElementById('tt-inn').innerHTML  = `${Math.round(d.inn)}<span>Inn</span>`;
      const rect    = e.chart.canvas.getBoundingClientRect();
      const canvasX = e.native.clientX - rect.left;
      const canvasY = e.native.clientY - rect.top;
      const tipW = 160;
      const left = canvasX + tipW + 20 > rect.width ? canvasX - tipW - 10 : canvasX + 14;
      tooltip.style.left    = left + 'px';
      tooltip.style.top     = (canvasY - 20) + 'px';
      tooltip.style.opacity = 1;
    }
  }
});

// Build legend
const legend = document.getElementById('legend');
POSITIONS.forEach(pos => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<div class="legend-dot" style="background:${POS_COLORS[pos]}"></div>${pos}`;
  item.style.opacity = '1';
  item.addEventListener('click', () => {
    if (activePos.has(pos)) {
      activePos.delete(pos);
      item.style.opacity = '0.3';
    } else {
      activePos.add(pos);
      item.style.opacity = '1';
    }
    chart.data.datasets = buildDatasets();
    chart.update();
  });
  legend.appendChild(item);
});
