<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Pitching Seasons at Age 24</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111115;
    color: #e8e6e0;
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    padding: 48px 24px 80px;
  }

  .page {
    max-width: 860px;
    margin: 0 auto;
  }

  .masthead {
    margin-bottom: 40px;
    border-left: 3px solid #c8952a;
    padding-left: 20px;
  }

  .masthead-eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: .12em;
    color: #c8952a;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .masthead-title {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 900;
    color: #f0ede6;
    line-height: 1.15;
    margin-bottom: 10px;
  }

  .masthead-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: #6b6a66;
    letter-spacing: .04em;
  }

  .col-headers {
    display: grid;
    grid-template-columns: 40px 48px 1fr 70px 70px 70px 60px 60px;
    gap: 0 8px;
    padding: 0 14px 10px;
    border-bottom: 1px solid #2a2a30;
    margin-bottom: 6px;
  }

  .col-headers span {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: .08em;
    color: #4a4a50;
    text-align: right;
    text-transform: uppercase;
  }

  .col-headers .ch-name { text-align: left; }

  .row-wrap {
    position: relative;
    margin: 2px 0;
    border-radius: 6px;
    overflow: hidden;
    opacity: 0;
    transform: translateX(-16px);
  }

  .row-wrap.in {
    animation: rowIn .45s cubic-bezier(.22,1,.36,1) forwards;
  }

  @keyframes rowIn {
    to { opacity: 1; transform: translateX(0); }
  }

  .war-bar {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    width: 0;
    transition: width 1.1s cubic-bezier(.16,1,.3,1);
    border-radius: 6px;
  }

  .row {
    display: grid;
    grid-template-columns: 40px 48px 1fr 70px 70px 70px 60px 60px;
    gap: 0 8px;
    align-items: center;
    padding: 11px 14px;
    position: relative;
    z-index: 1;
    transition: background .15s;
    cursor: default;
  }

  .row:hover { background: rgba(255,255,255,.03); }

  .rank-num {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    color: #3a3a42;
    text-align: center;
    line-height: 1;
  }

  .rank-num.top { color: #c8952a; }
  .rank-num.top5 { color: #7a6030; }

  .avatar {
    width: 42px;
    height: 50px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    flex-shrink: 0;
    overflow: hidden;
  }

  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 15%;
  }

  .av-gold { background: #2a1f08; color: #c8952a; border: 1.5px solid #5a3d0f; }
  .av-amber { background: #221a08; color: #a07828; border: 1.5px solid #3d2e0a; }
  .av-blue { background: #0d1a28; color: #4a8bbf; border: 1.5px solid #1a3050; }

  .player-name {
    font-size: 13.5px;
    font-weight: 500;
    color: #e0ddd6;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .player-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    color: #4a4a50;
    margin-top: 2px;
    letter-spacing: .02em;
  }

  .stat {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: #a0a09a;
    text-align: right;
    white-space: nowrap;
  }

  .stat-war { color: #e0ddd6; font-weight: 500; }
  .stat-gold { color: #c8952a !important; }
  .stat-silver { color: #9090a0 !important; }

  .divider {
    border: none;
    border-top: 1px solid #1e1e24;
    margin: 10px 0;
  }

  .footer {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid #1e1e24;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: #3a3a42;
    letter-spacing: .04em;
  }
</style>
</head>

  {n:"Tom Brewer",y:1956,t:"BOS",war:5.2,era:3.5,fip:3.51,k:12.2,bb:10.8,hs:"https://cdn.jsdelivr.net/gh/diamond-mine-baseball/dataservice@main/headshots/Tom_Brewer_BOS_1961.jpg"},

  {n:"Lucas Giolito",y:2019,t:"CHW",war:5.2,era:3.41,fip:3.43,k:32.3,bb:8.1,hs:"https://cdn.jsdelivr.net/gh/diamond-mine-baseball/dataservice@main/headshots/Lucas_Giolito_BOS_2025.jpg"},

const maxWar = data[0].war;
const minEra = Math.min(...data.map(p => p.era));
const maxK   = Math.max(...data.map(p => p.k));
const minFip = Math.min(...data.map(p => p.fip));

const board = document.getElementById('board');

data.forEach((p, i) => {
  const initials = p.n.split(' ').map(w => w[0]).join('').slice(0, 2);
  const barPct   = (p.war / maxWar * 100).toFixed(2);
  const isTop1   = i === 0;
  const isTop5   = i < 5;

  const barColor = isTop1
    ? 'rgba(200,149,42,0.13)'
    : i < 5
      ? 'rgba(160,120,40,0.09)'
      : 'rgba(74,139,191,0.07)';

  const avClass = isTop1 ? 'av-gold' : isTop5 ? 'av-amber' : 'av-blue';
  const rankClass = isTop1 ? 'top' : isTop5 ? 'top5' : '';

  const eraClass  = p.era === minEra  ? ' stat-gold' : '';
  const kClass    = p.k   === maxK    ? ' stat-gold' : '';
  const fipClass  = p.fip === minFip  ? ' stat-gold' : '';

  if (i === 10 || i === 20 || i === 30 || i === 40) {
    board.insertAdjacentHTML('beforeend', '<hr class="divider">');
  }

  const wrap = document.createElement('div');
  wrap.className = 'row-wrap';
  wrap.style.animationDelay = (i * 55) + 'ms';

  const avatarContent = p.hs
    ? `<img src="${p.hs}" alt="${p.n}" onerror="this.parentNode.innerHTML='${initials}'">`
    : initials;

  wrap.innerHTML = `
    <div class="war-bar" id="b${i}" style="background:${barColor}"></div>
    <div class="row">
      <span class="rank-num ${rankClass}">${i + 1}</span>
      <div class="avatar ${avClass}">${avatarContent}</div>
      <div>
        <div class="player-name">${p.n}</div>
        <div class="player-meta">${p.y} &middot; ${p.t}</div>
      </div>
      <span class="stat stat-war ${isTop1 ? 'stat-gold' : ''}">${p.war.toFixed(1)}</span>
      <span class="stat${eraClass}">${p.era.toFixed(2)}</span>
      <span class="stat${fipClass}">${p.fip.toFixed(2)}</span>
      <span class="stat${kClass}">${p.k.toFixed(1)}%</span>
      <span class="stat">${p.bb.toFixed(1)}%</span>
    </div>`;

  board.appendChild(wrap);
});

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (!entry.isIntersecting) return;
    const wrap = entry.target;
    const idx  = parseInt(wrap.querySelector('[id^=b]').id.slice(1));
    wrap.classList.add('in');
    setTimeout(() => {
      const bar = document.getElementById('b' + idx);
      if (bar) bar.style.width = (data[idx].war / maxWar * 100).toFixed(2) + '%';
    }, idx * 55 + 250);
    observer.unobserve(wrap);
  });
}, { threshold: 0.05 });

document.querySelectorAll('.row-wrap').forEach(el => observer.observe(el));
</script>
</body>
</html>
