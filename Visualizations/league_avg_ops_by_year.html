<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>League Average OPS by Year</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111115;
    color: #e8e6e0;
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    padding: 48px 24px 80px;
  }
  .page { max-width: 900px; margin: 0 auto; }
  .masthead { margin-bottom: 40px; border-left: 3px solid #c8952a; padding-left: 20px; }
  .masthead-eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: .12em; color: #c8952a; text-transform: uppercase; margin-bottom: 10px; }
  .masthead-title { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 900; color: #f0ede6; line-height: 1.15; margin-bottom: 10px; }
  .masthead-sub { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #6b6a66; letter-spacing: .04em; }
  .chart-wrap { position: relative; width: 100%; height: 480px; margin-bottom: 24px; }
  .tooltip {
    position: absolute;
    background: #1c1c22;
    border: 1px solid #2a2a30;
    border-radius: 6px;
    padding: 10px 14px;
    pointer-events: none;
    opacity: 0;
    transition: opacity .15s;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: #e0ddd6;
    white-space: nowrap;
    z-index: 10;
  }
  .tt-year { font-size: 11px; color: #6b6a66; margin-bottom: 4px; }
  .tt-ops { font-size: 18px; font-weight: 500; color: #c8952a; margin-bottom: 2px; }
  .tt-n { font-size: 11px; color: #4a4a50; }
  .legend {
    display: flex;
    gap: 20px;
    margin-bottom: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: #4a4a50;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid #1e1e24; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #3a3a42; letter-spacing: .04em; }
</style>
</head>
<body>
<div class="page">

  <div class="masthead">
    <div class="masthead-eyebrow">MLB Batters · Min. 100 PA · 1947–2025</div>
    <div class="masthead-title">League Average OPS</div>
    <div class="masthead-sub">By season · Qualified batters only · OPS = On-base + Slugging</div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#c8952a"></div>avg OPS (left axis)</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(74,139,191,0.4);border-radius:2px"></div>qualified batters (right axis)</div>
  </div>

  <div class="chart-wrap">
    <canvas id="chart"></canvas>
    <div class="tooltip" id="tooltip">
      <div class="tt-year" id="tt-year"></div>
      <div class="tt-ops" id="tt-ops"></div>
      <div class="tt-n" id="tt-n"></div>
    </div>
  </div>

  <div class="footer">Source: FanGraphs via baseball.db · Min. 100 PA · OPS = On-Base Percentage + Slugging Percentage</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const raw = [
  {y:1947,ops:0.717,n:281},{y:1948,ops:0.727,n:272},{y:1949,ops:0.717,n:236},
  {y:1950,ops:0.735,n:227},{y:1951,ops:0.709,n:227},{y:1952,ops:0.695,n:223},
  {y:1953,ops:0.733,n:218},{y:1954,ops:0.722,n:220},{y:1955,ops:0.726,n:218},
  {y:1956,ops:0.723,n:224},{y:1957,ops:0.716,n:222},{y:1958,ops:0.723,n:226},
  {y:1959,ops:0.715,n:229},{y:1960,ops:0.713,n:223},{y:1961,ops:0.728,n:251},
  {y:1962,ops:0.718,n:284},{y:1963,ops:0.679,n:279},{y:1964,ops:0.681,n:283},
  {y:1965,ops:0.677,n:283},{y:1966,ops:0.682,n:281},{y:1967,ops:0.653,n:287},
  {y:1968,ops:0.634,n:291},{y:1969,ops:0.674,n:356},{y:1970,ops:0.700,n:357},
  {y:1971,ops:0.666,n:361},{y:1972,ops:0.654,n:350},{y:1973,ops:0.690,n:351},
  {y:1974,ops:0.679,n:347},{y:1975,ops:0.691,n:360},{y:1976,ops:0.673,n:345},
  {y:1977,ops:0.717,n:369},{y:1978,ops:0.686,n:380},{y:1979,ops:0.716,n:371},
  {y:1980,ops:0.708,n:384},{y:1981,ops:0.692,n:320},{y:1982,ops:0.707,n:372},
  {y:1983,ops:0.709,n:373},{y:1984,ops:0.700,n:382},{y:1985,ops:0.702,n:385},
  {y:1986,ops:0.713,n:388},{y:1987,ops:0.736,n:382},{y:1988,ops:0.686,n:374},
  {y:1989,ops:0.688,n:379},{y:1990,ops:0.704,n:382},{y:1991,ops:0.697,n:392},
  {y:1992,ops:0.688,n:390},{y:1993,ops:0.729,n:401},{y:1994,ops:0.761,n:367},
  {y:1995,ops:0.749,n:401},{y:1996,ops:0.754,n:408},{y:1997,ops:0.748,n:421},
  {y:1998,ops:0.742,n:429},{y:1999,ops:0.768,n:442},{y:2000,ops:0.770,n:440},
  {y:2001,ops:0.750,n:441},{y:2002,ops:0.739,n:440},{y:2003,ops:0.742,n:438},
  {y:2004,ops:0.755,n:435},{y:2005,ops:0.745,n:429},{y:2006,ops:0.762,n:429},
  {y:2007,ops:0.750,n:439},{y:2008,ops:0.739,n:447},{y:2009,ops:0.744,n:432},
  {y:2010,ops:0.722,n:442},{y:2011,ops:0.710,n:452},{y:2012,ops:0.713,n:459},
  {y:2013,ops:0.706,n:453},{y:2014,ops:0.693,n:443},{y:2015,ops:0.717,n:445},
  {y:2016,ops:0.732,n:438},{y:2017,ops:0.746,n:435},{y:2018,ops:0.719,n:448},
  {y:2019,ops:0.750,n:451},{y:2020,ops:0.752,n:310},{y:2021,ops:0.720,n:463},
  {y:2022,ops:0.689,n:469},{y:2023,ops:0.715,n:461},{y:2024,ops:0.693,n:455},
  {y:2025,ops:0.698,n:460},
];

const labels = raw.map(d => d.y);
const values = raw.map(d => d.ops);
const counts = raw.map(d => d.n);
const maxOps = Math.max(...values);
const minOps = Math.min(...values);

const ctx = document.getElementById('chart').getContext('2d');

const gradient = ctx.createLinearGradient(0, 0, 0, 480);
gradient.addColorStop(0, 'rgba(200,149,42,0.2)');
gradient.addColorStop(1, 'rgba(200,149,42,0.0)');

const pointColors = values.map(v =>
  v === maxOps ? '#c8952a' : v === minOps ? '#4a8bbf' : 'transparent'
);
const pointRadius = values.map(v =>
  v === maxOps || v === minOps ? 6 : 0
);

const eraPlugin = {
  id: 'eraShading',
  beforeDraw(chart) {
    const xScale = chart.scales.x;
    const yScale = chart.scales.y;
    const ctx2   = chart.ctx;
    const eras = [
      { start: 1963, end: 1969, color: 'rgba(74,139,191,0.07)', label: 'Dead ball era' },
      { start: 1993, end: 2007, color: 'rgba(200,149,42,0.06)', label: 'Steroid era'   },
      { start: 2010, end: 2014, color: 'rgba(74,139,191,0.07)', label: 'Strikeout era' },
    ];
    eras.forEach(era => {
      const i1 = labels.indexOf(era.start);
      const i2 = labels.indexOf(era.end);
      if (i1 < 0 || i2 < 0) return;
      const x1 = xScale.getPixelForValue(i1);
      const x2 = xScale.getPixelForValue(i2);
      ctx2.save();
      ctx2.fillStyle = era.color;
      ctx2.fillRect(x1, yScale.top, x2 - x1, yScale.bottom - yScale.top);
      ctx2.font = "500 9px 'IBM Plex Mono'";
      ctx2.fillStyle = 'rgba(255,255,255,0.18)';
      ctx2.textAlign = 'center';
      ctx2.fillText(era.label, (x1 + x2) / 2, yScale.top + 12);
      ctx2.restore();
    });
  }
};

Chart.register(eraPlugin);

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels,
    datasets: [
      {
        type: 'bar',
        data: counts,
        backgroundColor: 'rgba(74,139,191,0.1)',
        borderColor: 'rgba(74,139,191,0.2)',
        borderWidth: 1,
        borderRadius: 2,
        yAxisID: 'yN',
        xAxisID: 'x',
        order: 2,
        categoryPercentage: 1.0,
        barPercentage: 1.0,
      },
      {
        type: 'line',
        data: values,
        borderColor: '#c8952a',
        borderWidth: 2,
        backgroundColor: gradient,
        fill: true,
        tension: 0.3,
        pointBackgroundColor: pointColors,
        pointBorderColor: pointColors,
        pointRadius: pointRadius,
        pointHoverRadius: 6,
        pointHoverBackgroundColor: '#c8952a',
        pointHoverBorderColor: '#f0ede6',
        pointHoverBorderWidth: 2,
        yAxisID: 'y',
        xAxisID: 'x',
        order: 1,
      },
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 1400, easing: 'easeInOutQuart' },
    plugins: {
      legend: { display: false },
      tooltip: { enabled: false },
    },
    scales: {
      x: {
        offset: false,
        grid: { color: 'rgba(255,255,255,0.04)' },
        border: { color: '#2a2a30' },
        title: {
          display: true,
          text: 'Season',
          color: '#4a4a50',
          font: { family: "'IBM Plex Mono'", size: 11 },
          padding: { top: 8 },
        },
        ticks: {
          color: '#4a4a50',
          font: { family: "'IBM Plex Mono'", size: 11 },
          maxRotation: 0,
          autoSkip: true,
          maxTicksLimit: 16,
        }
      },
      y: {
        min: 0.61,
        max: 0.81,
        position: 'left',
        grid: { color: 'rgba(255,255,255,0.04)' },
        border: { color: '#2a2a30', dash: [4,4] },
        ticks: {
          color: '#4a4a50',
          font: { family: "'IBM Plex Mono'", size: 11 },
          callback: v => v.toFixed(3),
          stepSize: 0.02,
        }
      },
      yN: {
        min: 0,
        max: 700,
        position: 'right',
        grid: { display: false },
        border: { color: '#2a2a30' },
        ticks: {
          color: '#2e3d4a',
          font: { family: "'IBM Plex Mono'", size: 11 },
          callback: v => v.toLocaleString(),
          stepSize: 100,
        }
      }
    },
    interaction: { mode: 'index', intersect: false },
    onHover: (e, elements) => {
      const tooltip = document.getElementById('tooltip');
      if (!elements.length) { tooltip.style.opacity = 0; return; }
      const idx = elements[0].index;
      const d   = raw[idx];
      document.getElementById('tt-year').textContent = d.y;
      document.getElementById('tt-ops').textContent  = d.ops.toFixed(3) + ' OPS';
      document.getElementById('tt-n').textContent    = 'n = ' + d.n.toLocaleString() + ' qualified batters';
      const rect    = e.chart.canvas.getBoundingClientRect();
      const canvasX = e.native.clientX - rect.left;
      const canvasY = e.native.clientY - rect.top;
      const tipW    = 210;
      const left    = canvasX + tipW + 20 > rect.width ? canvasX - tipW - 10 : canvasX + 14;
      tooltip.style.left    = left + 'px';
      tooltip.style.top     = (canvasY - 20) + 'px';
      tooltip.style.opacity = 1;
    }
  }
});
</script>
</body>
</html>
